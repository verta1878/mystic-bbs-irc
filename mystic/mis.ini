; ====================================================================
; mis.ini - runtime settings for the Mystic Internet Server (MIS)
; ====================================================================
; Place this file in your Mystic data directory.  Settings here are
; read at runtime, so changes take effect without recompiling.
;
; NOTE: RefuseForeign now lives in the config editor
; (Config -> Servers -> SMTP Server -> Allow Foreign).  This file is now
; OPTIONAL - if present it OVERRIDES the config setting, for backward
; compatibility with older installs.  New installs can configure it in Mystic.
; Lines beginning with ; are comments.
;

[SMTP]

; RefuseForeign controls how the SMTP server treats mail addressed to
; a domain that is not your board's own domain (bbsCfg.inetDomain),
; when the recipient is not a known local user.
;
;   true   = reject such mail (this is the default and matches the
;            original A38 behavior)
;   false  = accept mail for foreign domains
;
; If this file or key is absent, the server behaves as if true.

RefuseForeign=true
